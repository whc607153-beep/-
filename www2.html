<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberOS Pro | 多主题展示主页</title>
    <style>
        /* --- 核心多颜色矩阵定义 --- */
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #030305;
            --panel-bg: rgba(10, 11, 18, 0.55);
            --border: rgba(0, 242, 254, 0.25);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        [data-theme="1"] {
            --primary: #00ff66;
            --secondary: #00aa33;
            --bg: #010502;
            --panel-bg: rgba(4, 12, 6, 0.65);
            --border: rgba(0, 255, 102, 0.25);
            --text-main: #f0fdf4;
            --text-muted: #6ba37b;
        }

        [data-theme="2"] {
            --primary: #d946ef;
            --secondary: #c084fc;
            --bg: #050206;
            --panel-bg: rgba(15, 6, 18, 0.6);
            --border: rgba(217, 70, 239, 0.25);
            --text-main: #fdf4ff;
            --text-muted: #a78bfa;
        }

        [data-theme="3"] {
            --primary: #f59e0b;
            --secondary: #f97316;
            --bg: #060401;
            --panel-bg: rgba(15, 10, 5, 0.65);
            --border: rgba(245, 158, 11, 0.25);
            --text-main: #fffbeb;
            --text-muted: #d97706;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
            padding: 20px;
            transition: background-color 0.5s ease;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-light {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--border) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
            filter: blur(50px);
        }

        .sys-statusbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 10px 20px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 1px;
            z-index: 10;
        }

        .window-panel {
            position: relative;
            width: 100%;
            max-width: 520px; /* 略微加宽，使四矩阵更好看 */
            background: var(--panel-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7), 0 0 30px var(--border);
            z-index: 5;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: box-shadow 0.3s ease, border 0.5s ease;
        }

        .window-header {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .dots { display: flex; gap: 8px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; background: #ff5f56; }
        .dot:nth-child(2) { background: #ffbd2e; }
        .dot:nth-child(3) { background: #27c93f; }
        .window-title { font-size: 12px; font-weight: bold; color: var(--primary); letter-spacing: 0.5px; transition: color 0.5s; }

        .window-body {
            padding: 35px 30px;
            max-height: 75vh;
            overflow-y: auto;
        }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 22px;
            margin-bottom: 30px;
            transform: translateZ(40px);
        }

        .avatar-box {
            position: relative;
            width: 90px;
            height: 90px;
            flex-shrink: 0;
        }
        .avatar-box::after {
            content: ''; position: absolute; inset: -4px; border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0.5; filter: blur(6px); z-index: -1;
            transition: background 0.5s;
        }
        .avatar {
            width: 100%; height: 100%; border-radius: 12px; object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2); background: #111;
        }

        .info h1 { font-size: 26px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
        .info p { font-size: 13px; color: var(--primary); font-weight: 600; letter-spacing: 1px; transition: color 0.5s; }

        .ping-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: bold;
            margin-top: 10px; cursor: pointer; transition: all 0.2s, border 0.5s;
        }
        .ping-badge:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        .section-label {
            font-size: 12px; color: var(--primary); font-weight: bold;
            margin: 24px 0 12px; text-transform: uppercase; letter-spacing: 1.5px;
            display: flex; align-items: center; gap: 8px;
            transform: translateZ(25px);
            transition: color 0.5s;
        }
        .section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); transition: background 0.5s; }

        .bio-text { font-size: 15px; color: var(--text-muted); line-height: 1.6; transform: translateZ(20px); }

        .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; transform: translateZ(15px); }
        .skill-node {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 14px; border-radius: 20px; font-size: 13px; transition: all 0.25s;
        }
        .skill-node:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); color: var(--primary); transform: translateY(-2px); }

        /* --- 升级后的 2x2 链接网格系统 --- */
        .links-matrix { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            transform: translateZ(10px); 
        }
        .interactive-link {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255,255,255,0.04); border-radius: 10px;
            color: inherit; text-decoration: none; font-size: 13px; font-weight: 500;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .interactive-link:hover {
            border-color: var(--primary);
            background: rgba(255,255,255,0.04);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateY(-2px);
            color: var(--primary);
        }
        .interactive-link i { font-size: 12px; opacity: 0.7; }

        .theme-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 10;
            background: var(--panel-bg); border: 1px solid var(--border);
            width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
            color: var(--primary); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: transform 0.3s, color 0.5s, border 0.5s;
        }
        .theme-btn:hover { transform: scale(1.1) rotate(45deg); color: #fff; border-color: var(--primary); }

        .window-body::-webkit-scrollbar { width: 5px; }
        .window-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        @media (max-width: 500px) {
            .profile-card { flex-direction: column; text-align: center; }
            .links-matrix { grid-template-columns: 1fr; } /* 移动端自动变单列 */
            body { perspective: none; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="ambient-light"></div>

    <div class="sys-statusbar">
        <div><i class="fas fa-satellite-dish"></i> MATRIX_NODE://STABLE</div>
        <div id="top-clock">00:00:00</div>
    </div>

    <div class="window-panel" id="mainCard">
        <div class="window-header">
            <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="window-title">IDENTITY_MANIFEST.sys</div>
            <div><i class="fas fa-shield-alt" style="opacity: 0.4; font-size: 12px;"></i></div>
        </div>
        <div class="window-body">
            
            <div class="profile-card">
                <div class="avatar-box">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=200" alt="Avatar" class="avatar">
                </div>
                <div class="info" style="text-align: left;">
                    <h1>CWH</h1>
                    <p>Full-Stack Developer & UI Architect</p>
                    <div class="ping-badge" id="pingClick">
                        <i class="fas fa-bolt"></i> PING: <span id="out-pings">124</span>
                    </div>
                </div>
            </div>

            <div class="section-label"><i class="fas fa-fingerprint"></i> Identity Bio</div>
            <p class="bio-text">
                你好！我是一个热衷于构建具备极致交互体验的开发者。在复杂的逻辑代码与感性的视觉美学之间寻找平衡，致力于打造让人眼前一亮的数字产品。
            </p>

            <div class="section-label"><i class="fas fa-terminal"></i> Vector Skills</div>
            <div class="skills-grid">
                <span class="skill-node">Vue / React</span>
                <span class="skill-node">Node.js</span>
                <span class="skill-node">TypeScript</span>
                <span class="skill-node">TailwindCSS</span>
                <span class="skill-node">Python</span>
                <span class="skill-node">UI/UX Design</span>
            </div>

            <div class="section-label"><i class="fas fa-link"></i> Quantum Links</div>
            <div class="links-matrix">
                <a href="https://whc607153-beep.github.io/my-/" class="interactive-link" target="_blank">
                    <span>💻 性格测试</span><i class="fas fa-arrow-up-right-from-square"></i>
                </a>
                <a href="https://whc607153-beep.github.io/vocab/" class="interactive-link">
                    <span>✉️ 生字测试</span><i class="fas fa-arrow-up-right-from-square"></i>
                </a>
                <a href="https://your-blog-link.com" class="interactive-link" target="_blank">
                    <span>no</span><i class="fas fa-arrow-up-right-from-square"></i>
                </a>
                <a href="https://juejin.cn" class="interactive-link" target="_blank">
                    <span>no</span><i class="fas fa-arrow-up-right-from-square"></i>
                </a>
            </div>

        </div>
    </div>

    <div class="theme-btn" id="themeBtn" title="切换环境色"><i class="fas fa-palette"></i></div>

    <script>
        // --- 1. 3D 鼠标视差扭曲 ---
        const card = document.getElementById('mainCard');
        if (window.innerWidth > 500) {
            document.addEventListener('mousemove', (e) => {
                const calcX = (window.innerWidth / 2 - e.clientX) / 22;
                const calcY = (window.innerHeight / 2 - e.clientY) / 22;
                card.style.transform = `rotateY(${calcX}deg) rotateX(${-calcY}deg)`;
            });
            document.addEventListener('mouseleave', () => {
                card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                card.style.transition = "transform 0.6s ease";
            });
            card.addEventListener('mouseenter', () => { card.style.transition = "none"; });
        }

        // --- 2. Canvas 动态粒子引擎 ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dotsArr = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class GridDot {
            constructor() { this.spawn(); }
            spawn() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.r = Math.random() * 1.5 + 0.5;
                this.vy = -(Math.random() * 0.4 + 0.1);
                this.alpha = Math.random() * 0.5 + 0.1;
            }
            march() {
                this.y += this.vy;
                if(this.y < 0) this.spawn();
            }
            render() {
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        for(let i=0; i<70; i++) dotsArr.push(new GridDot());
        function renderLoop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            dotsArr.forEach(d => { d.march(); d.render(); });
            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        // --- 3. 点赞粒子喷射 ---
        const pingBtn = document.getElementById('pingClick');
        const pingCount = document.getElementById('out-pings');
        pingBtn.addEventListener('click', (e) => {
            pingCount.innerText = parseInt(pingCount.innerText) + 1;
            const pop = document.createElement('span');
            pop.innerText = '⚡ PING!';
            pop.style.cssText = `position:fixed; left:${e.clientX}px; top:${e.clientY - 15}px; color:var(--primary); font-weight:bold; font-size:11px; pointer-events:none; transition:all 0.5s ease; z-index:999;`;
            document.body.appendChild(pop);
            setTimeout(() => { pop.style.transform = 'translateY(-35px) scale(1.2)'; pop.style.opacity = '0'; }, 10);
            setTimeout(() => pop.remove(), 500);
        });

        // --- 4. 主题切换机制 ---
        let currentThemeIndex = 0; 
        const totalThemes = 4;

        document.getElementById('themeBtn').addEventListener('click', () => {
            currentThemeIndex = (currentThemeIndex + 1) % totalThemes;
            if (currentThemeIndex === 0) {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', currentThemeIndex.toString());
            }
        });

        setInterval(() => { document.getElementById('top-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
